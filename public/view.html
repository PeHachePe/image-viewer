<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 24px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .panel {
      border: 1px solid #333;
      border-radius: 10px;
      background: #181818;
      padding: 16px;
      margin-bottom: 20px;
    }

    .topbar,
    .generator-row,
    .generator-output,
    .pagination-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .generator-output {
      margin-bottom: 0;
    }

    input,
    select {
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #444;
      background: #1b1b1b;
      color: #fff;
      border-radius: 8px;
      min-width: 0;
    }

    #ridInput {
      min-width: 280px;
      text-transform: uppercase;
    }

    #genRidInput {
      flex: 0 0 180px;
      width: 180px;
      text-transform: uppercase;
    }

    #genImgInput {
      flex: 1 1 0;
      width: 100%;
      min-width: 0;
    }

    #generatedUrlInput {
      flex: 1 1 0;
      width: 100%;
      min-width: 0;
    }

    #generatedUrlInput[readonly] {
      color: #cfcfcf;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      background: #2d6cdf;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #1f57b8;
    }

    .generator-row > button,
    .generator-output > button {
      flex: 0 0 auto;
    }

    .status {
      margin-bottom: 16px;
      color: #ccc;
    }

    .tabs-bar {
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
    }

    .search-tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 260px;
      padding: 8px 10px;
      border: 1px solid #444;
      border-radius: 999px;
      background: #141414;
      color: #ddd;
      cursor: pointer;
      user-select: none;
    }

    .search-tab:hover {
      background: #1d1d1d;
    }

    .search-tab.active {
      background: #233c67;
      border-color: #3f78d9;
      color: #fff;
    }

    .search-tab-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 150px;
      font-size: 14px;
    }

    .search-tab-count {
      font-size: 12px;
      color: #aaa;
      flex: 0 0 auto;
    }

    .search-tab.active .search-tab-count {
      color: #d6e6ff;
    }

    .search-tab-close {
      width: 22px;
      height: 22px;
      min-width: 22px;
      padding: 0;
      border: 1px solid #4a4a4a;
      border-radius: 999px;
      background: transparent;
      color: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }

    .search-tab-close:hover {
      background: rgba(255,255,255,0.08);
    }

    .table-wrapper {
      overflow-x: auto;
      border: 1px solid #333;
      border-radius: 10px;
      background: #181818;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1120px;
    }

    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #2b2b2b;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #222;
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 1;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th:hover {
      background: #2a2a2a;
    }

    tr:hover td {
      background: #202020;
    }

    .empty {
      padding: 20px;
      color: #bbb;
    }

    .parent-row td {
      background: #191919;
      font-weight: 600;
    }

    .child-row td {
      background: #141414;
      color: #ccc;
      font-size: 13px;
    }

    .child-row td:first-child {
      padding-left: 42px;
    }

    .ip-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-ip-btn,
    .mini-btn,
    .map-btn,
    .page-btn {
      width: 24px;
      height: 24px;
      min-width: 24px;
      padding: 0;
      border-radius: 6px;
      border: 1px solid #444;
      background: transparent;
      color: #fff;
      font-size: 13px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .toggle-ip-btn:hover,
    .mini-btn:hover,
    .map-btn:hover,
    .page-btn:hover {
      background: #2a2a2a;
    }

    .toggle-ip-btn.hidden,
    .map-btn.hidden {
      visibility: hidden;
    }

    .sort-indicator {
      margin-left: 6px;
      color: #aaa;
      font-size: 12px;
    }

    .ua-full {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      color: #888;
      font-weight: 400;
      word-break: break-word;
    }

    .coords-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .coords-text {
      white-space: nowrap;
    }

    .copied {
      border-color: #2d6cdf;
      color: #7db3ff;
    }

    .hint {
      font-size: 13px;
      color: #aaa;
      margin-top: 2px;
    }

    .pagination-bar {
      justify-content: space-between;
      margin-top: 14px;
      margin-bottom: 0;
    }

    .pagination-left,
    .pagination-right {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .page-info {
      color: #bbb;
      font-size: 14px;
    }

    .page-btn {
      width: auto;
      min-width: 34px;
      padding: 0 10px;
      height: 32px;
      font-size: 14px;
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .preview-box {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #141414;
      display: none;
    }

    .preview-status {
      font-size: 14px;
      color: #bbb;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .preview-status.ok {
      color: #7ddc8b;
    }

    .preview-status.error {
      color: #ff8b8b;
    }

    .preview-image {
      display: none;
      max-width: 100%;
      max-height: 220px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0f0f0f;
    }

    @media (max-width: 768px) {
      body {
        padding: 14px;
      }

      .panel {
        padding: 12px;
      }

      .topbar,
      .generator-row,
      .generator-output,
      .pagination-bar,
      .pagination-left,
      .pagination-right {
        flex-direction: column;
        gap: 10px;
        align-items: stretch;
      }

      .topbar input,
      .generator-row input,
      .generator-output input,
      .topbar button,
      .generator-row button,
      .generator-output button,
      .pagination-bar select,
      .pagination-bar button {
        width: 100%;
        min-width: 0;
      }

      #genRidInput {
        flex: 1 1 100%;
        width: 100%;
      }

      .tabs-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .search-tab {
        max-width: none;
        width: 100%;
        justify-content: space-between;
      }

      .search-tab-label {
        max-width: none;
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="panel">
    <h2>Generador de URL</h2>

    <div class="generator-row">
      <input id="genRidInput" type="text" placeholder="RID" />
      <input id="genImgInput" type="text" placeholder="URL de imagen o gif" />
      <button id="generateBtn" type="button">Generar</button>
    </div>

    <div class="generator-output">
      <input id="generatedUrlInput" type="text" readonly placeholder="Aquí saldrá la URL generada" />
      <button id="copyGeneratedBtn" type="button">Copiar</button>
    </div>

    <div id="imagePreviewBox" class="preview-box">
      <div id="imagePreviewStatus" class="preview-status"></div>
      <img id="imagePreview" class="preview-image" alt="Vista previa de imagen" />
    </div>

    <div class="hint">
      La URL generada usará <code>/api/i?rid=...&img=...</code><br>
      Solo se admiten imágenes <code>.jpg</code>, <code>.png</code> y <code>.gif</code>
    </div>
  </div>

  <div class="panel">
    <h2>Buscar registros</h2>

    <div class="topbar">
      <input id="ridInput" type="text" placeholder="introduce el rid" />
      <button id="loadBtn">Cargar</button>
    </div>

    <div id="status" class="status">Introduce un rid y pulsa Cargar.</div>

    <div id="tabsBar" class="tabs-bar"></div>

    <div class="table-wrapper">
      <table id="visitsTable" style="display: none;">
        <thead>
          <tr>
            <th data-sort="ip">IP<span class="sort-indicator"></span></th>
            <th data-sort="created_at">Fecha<span class="sort-indicator"></span></th>
            <th data-sort="country">País<span class="sort-indicator"></span></th>
            <th data-sort="region">Región<span class="sort-indicator"></span></th>
            <th data-sort="city">Ciudad<span class="sort-indicator"></span></th>
            <th data-sort="latitude">Coordenadas<span class="sort-indicator"></span></th>
            <th data-sort="user_agent">Dispositivo<span class="sort-indicator"></span></th>
          </tr>
        </thead>
        <tbody id="visitsTbody"></tbody>
      </table>

      <div id="emptyState" class="empty">No hay datos cargados.</div>
    </div>

    <div id="paginationBar" class="pagination-bar" style="display: none;">
      <div class="pagination-left">
        <label for="pageSizeSelect">Filas por página</label>
        <select id="pageSizeSelect">
          <option value="10" selected>10</option>
          <option value="20">20</option>
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="all">Todos</option>
        </select>
      </div>

      <div class="pagination-right">
        <button id="firstPageBtn" class="page-btn" type="button">&lt;&lt;</button>
        <button id="prevPageBtn" class="page-btn" type="button">&lt;</button>
        <span id="pageInfo" class="page-info"></span>
        <button id="nextPageBtn" class="page-btn" type="button">&gt;</button>
        <button id="lastPageBtn" class="page-btn" type="button">&gt;&gt;</button>
      </div>
    </div>
  </div>

  <script>
    const ridInput = document.getElementById('ridInput');
    const loadBtn = document.getElementById('loadBtn');
    const statusEl = document.getElementById('status');
    const table = document.getElementById('visitsTable');
    const tbody = document.getElementById('visitsTbody');
    const emptyState = document.getElementById('emptyState');
    const tabsBar = document.getElementById('tabsBar');

    const genRidInput = document.getElementById('genRidInput');
    const genImgInput = document.getElementById('genImgInput');
    const generateBtn = document.getElementById('generateBtn');
    const generatedUrlInput = document.getElementById('generatedUrlInput');
    const copyGeneratedBtn = document.getElementById('copyGeneratedBtn');

    const imagePreviewBox = document.getElementById('imagePreviewBox');
    const imagePreviewStatus = document.getElementById('imagePreviewStatus');
    const imagePreview = document.getElementById('imagePreview');

    const paginationBar = document.getElementById('paginationBar');
    const pageSizeSelect = document.getElementById('pageSizeSelect');
    const firstPageBtn = document.getElementById('firstPageBtn');
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const lastPageBtn = document.getElementById('lastPageBtn');
    const pageInfo = document.getElementById('pageInfo');

    let currentVisits = [];
    let sortState = {
      key: 'created_at',
      direction: 'desc'
    };

    let paginationState = {
      page: 1,
      pageSize: 10
    };

    const generatedRidSet = new Set();
    let lastRidGeneratedForImage = '';
    let lastPreviewUrl = '';

    let tabs = [];
    let activeTabId = null;
    let tabCounter = 0;

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatDate(value) {
      if (!value) return '';

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;

      return new Intl.DateTimeFormat(undefined, {
        dateStyle: 'short',
        timeStyle: 'medium'
      }).format(date);
    }

    function parseUserAgent(ua) {
      if (!ua) {
        return {
          short: '',
          full: ''
        };
      }

      const lower = ua.toLowerCase();

      let device = 'Desconocido';
      let browser = 'Navegador';

      if (lower.includes('iphone')) device = 'iPhone';
      else if (lower.includes('ipad')) device = 'iPad';
      else if (lower.includes('android')) device = 'Android';
      else if (lower.includes('windows')) device = 'Windows';
      else if (lower.includes('mac os x') || lower.includes('macintosh')) device = 'Mac';
      else if (lower.includes('linux')) device = 'Linux';

      if (lower.includes('edg/')) browser = 'Edge';
      else if (lower.includes('opr/') || lower.includes('opera')) browser = 'Opera';
      else if (lower.includes('chrome/') && !lower.includes('edg/')) browser = 'Chrome';
      else if (lower.includes('firefox/')) browser = 'Firefox';
      else if (lower.includes('safari/') && !lower.includes('chrome/')) browser = 'Safari';

      return {
        short: `${device} · ${browser}`,
        full: ua
      };
    }

    function compareValues(a, b, key, direction) {
      let valueA = a[key] ?? '';
      let valueB = b[key] ?? '';

      if (key === 'created_at') {
        valueA = valueA ? new Date(valueA).getTime() : 0;
        valueB = valueB ? new Date(valueB).getTime() : 0;
      } else if (key === 'latitude' || key === 'longitude') {
        valueA = valueA === '' ? Number.NEGATIVE_INFINITY : Number(valueA);
        valueB = valueB === '' ? Number.NEGATIVE_INFINITY : Number(valueB);
      } else {
        valueA = String(valueA).toLowerCase();
        valueB = String(valueB).toLowerCase();
      }

      let result = 0;

      if (valueA < valueB) result = -1;
      if (valueA > valueB) result = 1;

      return direction === 'asc' ? result : -result;
    }

    function sortVisits(visits) {
      const sorted = [...visits].sort((a, b) =>
        compareValues(a, b, sortState.key, sortState.direction)
      );

      return sorted.map((visit) => {
        const children = Array.isArray(visit.children) ? [...visit.children] : [];
        children.sort((a, b) => compareValues(a, b, sortState.key, sortState.direction));

        return {
          ...visit,
          children
        };
      });
    }

    function getTabById(tabId) {
      return tabs.find((tab) => tab.id === tabId) || null;
    }

    function getTabByRid(rid) {
      const cleanRid = String(rid || '').trim().toUpperCase();
      return tabs.find((tab) => tab.rid === cleanRid) || null;
    }

    function getActiveTab() {
      return getTabById(activeTabId);
    }

    function createTab(rid) {
      tabCounter += 1;

      return {
        id: `tab_${tabCounter}`,
        rid: String(rid || '').trim().toUpperCase(),
        visits: [],
        status: 'Cargando...',
        error: '',
        loading: true,
        loaded: false,
        sortState: {
          key: 'created_at',
          direction: 'desc'
        },
        paginationState: {
          page: 1,
          pageSize: 10
        }
      };
    }

    function updateBrowserTabsParams() {
      const nextUrl = new URL(window.location.href);
      nextUrl.searchParams.delete('rid');
      nextUrl.searchParams.delete('active');

      tabs.forEach((tab) => {
        if (tab.rid) {
          nextUrl.searchParams.append('rid', tab.rid);
        }
      });

      const activeTab = getActiveTab();
      if (activeTab && activeTab.rid) {
        nextUrl.searchParams.set('active', activeTab.rid);
      }

      window.history.replaceState({}, '', nextUrl.toString());
    }

    function renderTabs() {
      tabsBar.innerHTML = '';

      if (tabs.length === 0) {
        tabsBar.style.display = 'none';
        return;
      }

      tabsBar.style.display = 'flex';

      tabs.forEach((tab) => {
        const tabEl = document.createElement('div');
        tabEl.className = `search-tab${tab.id === activeTabId ? ' active' : ''}`;

        const countText = tab.loading
          ? '...'
          : String(Array.isArray(tab.visits) ? tab.visits.length : 0);

        tabEl.innerHTML = `
          <span class="search-tab-label" title="${escapeHtml(tab.rid)}">${escapeHtml(tab.rid)}</span>
          <span class="search-tab-count">${escapeHtml(countText)}</span>
          <button class="search-tab-close" type="button" title="Cerrar">×</button>
        `;

        tabEl.addEventListener('click', (event) => {
          if (event.target.closest('.search-tab-close')) {
            return;
          }
          activateTab(tab.id);
        });

        tabEl.querySelector('.search-tab-close').addEventListener('click', (event) => {
          event.stopPropagation();
          closeTab(tab.id);
        });

        tabsBar.appendChild(tabEl);
      });
    }

    function applyActiveTabToView() {
      const activeTab = getActiveTab();

      if (!activeTab) {
        currentVisits = [];
        sortState = {
          key: 'created_at',
          direction: 'desc'
        };
        paginationState = {
          page: 1,
          pageSize: Number(pageSizeSelect.value) || 10
        };

        ridInput.value = '';
        statusEl.textContent = 'Introduce un rid y pulsa Cargar.';
        table.style.display = 'none';
        emptyState.style.display = 'block';
        emptyState.textContent = 'No hay datos cargados.';
        paginationBar.style.display = 'none';
        updateSortIndicators();
        renderTabs();
        updateBrowserTabsParams();
        return;
      }

      ridInput.value = activeTab.rid;
      currentVisits = Array.isArray(activeTab.visits) ? activeTab.visits : [];
      sortState = { ...activeTab.sortState };
      paginationState = { ...activeTab.paginationState };

      pageSizeSelect.value = paginationState.pageSize === 'all'
        ? 'all'
        : String(paginationState.pageSize);

      if (activeTab.loading) {
        statusEl.textContent = 'Cargando...';
        table.style.display = 'none';
        emptyState.style.display = 'block';
        emptyState.textContent = 'Cargando datos...';
        paginationBar.style.display = 'none';
      } else if (activeTab.error) {
        statusEl.textContent = 'Error al cargar los datos.';
        table.style.display = 'none';
        emptyState.style.display = 'block';
        emptyState.textContent = activeTab.error;
        paginationBar.style.display = 'none';
      } else if (!currentVisits.length) {
        statusEl.textContent = 'No se han encontrado registros para ese rid.';
        table.style.display = 'none';
        emptyState.style.display = 'block';
        emptyState.textContent = 'Sin resultados.';
        paginationBar.style.display = 'none';
      } else {
        statusEl.textContent = `Se han encontrado ${currentVisits.length} IPs agrupadas.`;
        emptyState.style.display = 'none';
        table.style.display = 'table';
        renderTable();
      }

      updateSortIndicators();
      renderTabs();
      updateBrowserTabsParams();
    }

    function activateTab(tabId) {
      if (!getTabById(tabId)) return;

      activeTabId = tabId;
      applyActiveTabToView();

      const activeTab = getActiveTab();
      if (activeTab && !activeTab.loading && currentVisits.length) {
        renderTable();
      }
    }

    function closeTab(tabId) {
      const closeIndex = tabs.findIndex((tab) => tab.id === tabId);
      if (closeIndex === -1) return;

      const wasActive = tabs[closeIndex].id === activeTabId;
      tabs.splice(closeIndex, 1);

      if (!tabs.length) {
        activeTabId = null;
        applyActiveTabToView();
        return;
      }

      if (wasActive) {
        const nextTab = tabs[Math.max(0, closeIndex - 1)] || tabs[0];
        activeTabId = nextTab.id;
      }

      applyActiveTabToView();

      const activeTab = getActiveTab();
      if (activeTab && !activeTab.loading && activeTab.visits.length) {
        renderTable();
      }
    }

    function createOrActivateTab(rid) {
      const cleanRid = String(rid || '').trim().toUpperCase();
      const existingTab = getTabByRid(cleanRid);

      if (existingTab) {
        activeTabId = existingTab.id;
        applyActiveTabToView();
        return existingTab;
      }

      const tab = createTab(cleanRid);
      tab.paginationState.pageSize = pageSizeSelect.value === 'all' ? 'all' : Number(pageSizeSelect.value);
      tabs.push(tab);
      activeTabId = tab.id;
      applyActiveTabToView();
      return tab;
    }

    function persistActiveTabState() {
      const activeTab = getActiveTab();
      if (!activeTab) return;

      activeTab.sortState = { ...sortState };
      activeTab.paginationState = { ...paginationState };
      activeTab.visits = [...currentVisits];
    }

    function getPagedVisits(visits) {
      if (paginationState.pageSize === 'all') {
        return visits;
      }

      const size = Number(paginationState.pageSize);
      const start = (paginationState.page - 1) * size;
      const end = start + size;

      return visits.slice(start, end);
    }

    function getTotalPages(totalItems) {
      if (paginationState.pageSize === 'all') {
        return totalItems > 0 ? 1 : 0;
      }

      const size = Number(paginationState.pageSize);
      return Math.ceil(totalItems / size);
    }

    function updateSortIndicators() {
      const headers = document.querySelectorAll('th[data-sort]');

      headers.forEach((th) => {
        const indicator = th.querySelector('.sort-indicator');
        if (!indicator) return;

        if (th.dataset.sort === sortState.key) {
          indicator.textContent = sortState.direction === 'asc' ? '▲' : '▼';
        } else {
          indicator.textContent = '';
        }
      });
    }

    function updatePaginationUI(totalItems) {
      if (totalItems === 0) {
        paginationBar.style.display = 'none';
        return;
      }

      paginationBar.style.display = 'flex';

      const totalPages = getTotalPages(totalItems);

      if (paginationState.page > totalPages && totalPages > 0) {
        paginationState.page = totalPages;
      }

      if (paginationState.pageSize === 'all') {
        pageInfo.textContent = `${totalItems} resultados`;
        firstPageBtn.disabled = true;
        prevPageBtn.disabled = true;
        nextPageBtn.disabled = true;
        lastPageBtn.disabled = true;
        return;
      }

      pageInfo.textContent = `Página ${paginationState.page} de ${totalPages}`;
      firstPageBtn.disabled = paginationState.page <= 1;
      prevPageBtn.disabled = paginationState.page <= 1;
      nextPageBtn.disabled = paginationState.page >= totalPages;
      lastPageBtn.disabled = paginationState.page >= totalPages;
    }

    function getCoordsText(latitude, longitude) {
      const hasLat = latitude !== null && latitude !== undefined && latitude !== '';
      const hasLon = longitude !== null && longitude !== undefined && longitude !== '';

      if (!hasLat && !hasLon) return '';
      return `${latitude ?? ''}, ${longitude ?? ''}`;
    }

    function createCoordsCell(latitude, longitude) {
      const coordsText = getCoordsText(latitude, longitude);
      const hasCoords = !!coordsText;

      return `
        <div class="coords-cell">
          <span class="coords-text">${escapeHtml(coordsText)}</span>
          <button
            class="map-btn ${hasCoords ? '' : 'hidden'}"
            type="button"
            data-lat="${escapeHtml(latitude ?? '')}"
            data-lon="${escapeHtml(longitude ?? '')}"
            title="Abrir en Google Maps"
          >
            📍
          </button>
        </div>
      `;
    }

    function createParentRow(visit, index) {
      const tr = document.createElement('tr');
      tr.className = 'parent-row';

      const hasChildren = Array.isArray(visit.children) && visit.children.length > 0;
      const groupClass = `child-group-${index}`;
      const parsedUa = parseUserAgent(visit.user_agent);

      tr.innerHTML = `
        <td>
          <div class="ip-cell">
            <button
              class="toggle-ip-btn ${hasChildren ? '' : 'hidden'}"
              data-group="${groupClass}"
              data-open="false"
              type="button"
              title="Desplegar"
            >
              +
            </button>
            <span>${escapeHtml(visit.ip || '')}</span>
            <button
              class="mini-btn copy-ip-btn"
              type="button"
              data-ip="${escapeHtml(visit.ip || '')}"
              title="Copiar IP"
            >
              ⧉
            </button>
          </div>
        </td>
        <td>${escapeHtml(formatDate(visit.created_at))}</td>
        <td>${escapeHtml(visit.country || '')}</td>
        <td>${escapeHtml(visit.region || '')}</td>
        <td>${escapeHtml(visit.city || '')}</td>
        <td>${createCoordsCell(visit.latitude, visit.longitude)}</td>
        <td>
          ${escapeHtml(parsedUa.short)}
          <span class="ua-full">${escapeHtml(parsedUa.full)}</span>
        </td>
      `;

      return tr;
    }

    function createChildRow(child, index) {
      const tr = document.createElement('tr');
      tr.className = `child-row child-group-${index}`;
      tr.style.display = 'none';

      const parsedUa = parseUserAgent(child.user_agent);

      tr.innerHTML = `
        <td>
          <div class="ip-cell">
            <span>↳ ${escapeHtml(child.ip || '')}</span>
            <button
              class="mini-btn copy-ip-btn"
              type="button"
              data-ip="${escapeHtml(child.ip || '')}"
              title="Copiar IP"
            >
              ⧉
            </button>
          </div>
        </td>
        <td>${escapeHtml(formatDate(child.first_seen || child.created_at || ''))}</td>
        <td>${escapeHtml(child.country || '')}</td>
        <td>${escapeHtml(child.region || '')}</td>
        <td>${escapeHtml(child.city || '')}</td>
        <td>${createCoordsCell(child.latitude, child.longitude)}</td>
        <td>
          ${escapeHtml(parsedUa.short)}
          <span class="ua-full">${escapeHtml(parsedUa.full)}</span>
        </td>
      `;

      return tr;
    }

    async function copyText(text, button) {
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);

        if (button) {
          const old = button.textContent;
          button.textContent = '✓';
          button.classList.add('copied');

          setTimeout(() => {
            button.textContent = old;
            button.classList.remove('copied');
          }, 900);
        }
      } catch {
        const temp = document.createElement('textarea');
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
      }
    }

    function bindCopyButtons() {
      const buttons = document.querySelectorAll('.copy-ip-btn');

      buttons.forEach((button) => {
        button.addEventListener('click', () => {
          copyText(button.dataset.ip || '', button);
        });
      });
    }

    function bindMapButtons() {
      const buttons = document.querySelectorAll('.map-btn:not(.hidden)');

      buttons.forEach((button) => {
        button.addEventListener('click', () => {
          const lat = button.dataset.lat;
          const lon = button.dataset.lon;

          if (!lat || !lon) return;

          const url = `https://www.google.com/maps?q=${encodeURIComponent(lat)},${encodeURIComponent(lon)}`;
          window.open(url, '_blank', 'noopener,noreferrer');
        });
      });
    }

    function bindToggleButtons() {
      const buttons = document.querySelectorAll('.toggle-ip-btn:not(.hidden)');

      buttons.forEach((button) => {
        button.addEventListener('click', () => {
          const groupClass = button.dataset.group;
          const isOpen = button.dataset.open === 'true';
          const rows = document.querySelectorAll('.' + groupClass);

          rows.forEach((row) => {
            row.style.display = isOpen ? 'none' : 'table-row';
          });

          button.dataset.open = isOpen ? 'false' : 'true';
          button.textContent = isOpen ? '+' : '−';
        });
      });
    }

    function renderTable() {
      tbody.innerHTML = '';

      const sortedVisits = sortVisits(currentVisits);
      const totalItems = sortedVisits.length;
      const pagedVisits = getPagedVisits(sortedVisits);

      pagedVisits.forEach((visit, index) => {
        tbody.appendChild(createParentRow(visit, index));

        if (Array.isArray(visit.children) && visit.children.length > 0) {
          visit.children.forEach((child) => {
            tbody.appendChild(createChildRow(child, index));
          });
        }
      });

      bindToggleButtons();
      bindCopyButtons();
      bindMapButtons();
      updateSortIndicators();
      updatePaginationUI(totalItems);
      persistActiveTabState();
      renderTabs();
    }

    async function loadVisitsByRid(rid) {
      const cleanRid = String(rid || '').trim().toUpperCase();

      if (!cleanRid) {
        statusEl.textContent = 'Debes introducir un rid.';
        table.style.display = 'none';
        emptyState.style.display = 'block';
        emptyState.textContent = 'No hay datos cargados.';
        paginationBar.style.display = 'none';
        return;
      }

      ridInput.value = cleanRid;

      const tab = createOrActivateTab(cleanRid);
      tab.rid = cleanRid;
      tab.loading = true;
      tab.loaded = false;
      tab.error = '';
      tab.status = 'Cargando...';
      tab.sortState = { ...sortState };
      tab.paginationState = {
        page: 1,
        pageSize: pageSizeSelect.value === 'all' ? 'all' : Number(pageSizeSelect.value)
      };

      activeTabId = tab.id;
      applyActiveTabToView();

      try {
        const response = await fetch('/api/visits?rid=' + encodeURIComponent(cleanRid));
        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || 'Error al cargar visitas');
        }

        tab.visits = Array.isArray(data.visits) ? data.visits : [];
        tab.loading = false;
        tab.loaded = true;
        tab.error = '';
        tab.status = tab.visits.length
          ? `Se han encontrado ${tab.visits.length} IPs agrupadas.`
          : 'No se han encontrado registros para ese rid.';
      } catch (error) {
        tab.visits = [];
        tab.loading = false;
        tab.loaded = true;
        tab.error = error.message || 'Error inesperado.';
        tab.status = 'Error al cargar los datos.';
      }

      if (tab.id === activeTabId) {
        applyActiveTabToView();

        if (!tab.loading && !tab.error && tab.visits.length) {
          renderTable();
        }
      } else {
        renderTabs();
        updateBrowserTabsParams();
      }
    }

    async function loadVisits() {
      return loadVisitsByRid(ridInput.value);
    }

    function handleSortClick(event) {
      const th = event.currentTarget;
      const key = th.dataset.sort;
      const activeTab = getActiveTab();

      if (!key || !activeTab) return;

      if (sortState.key === key) {
        sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
      } else {
        sortState.key = key;
        sortState.direction = key === 'created_at' ? 'desc' : 'asc';
      }

      paginationState.page = 1;
      activeTab.sortState = { ...sortState };
      activeTab.paginationState = { ...paginationState };
      renderTable();
    }

    function getImageValidationMessage() {
      return 'La URL o imagen no es válida. Solo se admiten archivos .jpg, .png y .gif';
    }

    function extractFirstImageCandidate(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';

      const compact = raw.replace(/\s+/g, '');
      const match = compact.match(/((https?:\/\/|\/\/)?[^"'<>]+?\.(jpg|png|gif))/i);

      return match ? match[1] : '';
    }

    function normalizeImageUrl(value) {
      let raw = extractFirstImageCandidate(value);

      if (!raw) return '';

      if (raw.startsWith('//')) {
        raw = 'https:' + raw;
      } else if (!/^https?:\/\//i.test(raw)) {
        raw = 'https://' + raw;
      }

      try {
        const url = new URL(raw);

        if (!/\.(jpg|png|gif)$/i.test(url.pathname)) {
          return '';
        }

        return url.toString();
      } catch {
        return '';
      }
    }

    function isValidImageUrl(url) {
      if (!url) return false;

      try {
        const parsed = new URL(url);
        return /\.(jpg|png|gif)$/i.test(parsed.pathname);
      } catch {
        return false;
      }
    }

    function getImageParamValue(url) {
      return String(url || '').replace(/^https?:\/\//i, '');
    }

    function generateRandomRid(length = 5) {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let rid = '';

      for (let i = 0; i < length; i += 1) {
        rid += chars.charAt(Math.floor(Math.random() * chars.length));
      }

      return rid;
    }

    function generateUniqueRid(length = 5, maxAttempts = 200) {
      for (let i = 0; i < maxAttempts; i += 1) {
        const rid = generateRandomRid(length);

        if (!generatedRidSet.has(rid)) {
          generatedRidSet.add(rid);
          return rid;
        }
      }

      const fallback = `${Date.now().toString(36).toUpperCase().slice(-5)}`;
      generatedRidSet.add(fallback);
      return fallback;
    }

    function ensureRidExists() {
      const currentRid = genRidInput.value.trim().toUpperCase();

      if (currentRid) {
        genRidInput.value = currentRid;
        ridInput.value = currentRid;
        return currentRid;
      }

      const newRid = generateUniqueRid(5);
      genRidInput.value = newRid;
      ridInput.value = newRid;
      return newRid;
    }

    function regenerateRidForCurrentImage() {
      const img = normalizeImageUrl(genImgInput.value);

      if (!img || !isValidImageUrl(img)) {
        return;
      }

      if (img !== lastRidGeneratedForImage) {
        const newRid = generateUniqueRid(5);
        genRidInput.value = newRid;
        ridInput.value = newRid;
        lastRidGeneratedForImage = img;
      }
    }

    function resetImagePreview() {
      imagePreviewBox.style.display = 'none';
      imagePreview.style.display = 'none';
      imagePreview.removeAttribute('src');
      imagePreviewStatus.textContent = '';
      imagePreviewStatus.className = 'preview-status';
      lastPreviewUrl = '';
    }

    function showPreviewMessage(message, type = '') {
      imagePreviewBox.style.display = 'block';
      imagePreview.style.display = 'none';
      imagePreview.removeAttribute('src');
      imagePreviewStatus.textContent = message;
      imagePreviewStatus.className = `preview-status ${type}`.trim();
      lastPreviewUrl = '';
    }

    function updateImagePreview(force = false) {
      const rawValue = genImgInput.value.trim();

      if (!rawValue) {
        resetImagePreview();
        return;
      }

      const normalizedUrl = normalizeImageUrl(rawValue);

      if (!normalizedUrl || !isValidImageUrl(normalizedUrl)) {
        showPreviewMessage(getImageValidationMessage(), 'error');
        return;
      }

      if (!force && normalizedUrl === lastPreviewUrl && imagePreview.getAttribute('src') === normalizedUrl) {
        return;
      }

      imagePreviewBox.style.display = 'block';
      imagePreview.style.display = 'none';
      imagePreviewStatus.textContent = 'Cargando vista previa...';
      imagePreviewStatus.className = 'preview-status';

      const testImage = new Image();

      testImage.onload = () => {
        imagePreview.src = normalizedUrl;
        imagePreview.style.display = 'block';
        imagePreviewStatus.textContent = 'Imagen válida.';
        imagePreviewStatus.className = 'preview-status ok';
        lastPreviewUrl = normalizedUrl;
      };

      testImage.onerror = () => {
        imagePreview.style.display = 'none';
        imagePreview.removeAttribute('src');
        imagePreviewStatus.textContent = getImageValidationMessage();
        imagePreviewStatus.className = 'preview-status error';
        lastPreviewUrl = '';
      };

      testImage.src = normalizedUrl;
    }

    function updateGeneratedUrl(options = {}) {
      const { refreshPreview = false } = options;
      const hasRawImage = genImgInput.value.trim() !== '';
      const img = normalizeImageUrl(genImgInput.value);

      if (hasRawImage && (!img || !isValidImageUrl(img))) {
        generatedUrlInput.value = '';
        showPreviewMessage(getImageValidationMessage(), 'error');
        return;
      }

      const rid = genRidInput.value.trim().toUpperCase();
      const baseUrl = `${window.location.origin}/api/i`;
      const params = new URLSearchParams();

      if (rid) {
        params.set('rid', rid);
      }

      if (img) {
        params.set('img', getImageParamValue(img));
      }

      generatedUrlInput.value = params.toString()
        ? `${baseUrl}?${params.toString()}`
        : '';

      if (refreshPreview) {
        updateImagePreview(false);
      }
    }

    function sanitizeImageInput() {
      const rawValue = genImgInput.value.trim();

      if (!rawValue) {
        lastRidGeneratedForImage = '';
        generatedUrlInput.value = '';
        resetImagePreview();
        updateGeneratedUrl();
        return false;
      }

      const normalized = normalizeImageUrl(rawValue);

      if (!normalized || !isValidImageUrl(normalized)) {
        genImgInput.value = '';
        lastRidGeneratedForImage = '';
        generatedUrlInput.value = '';
        showPreviewMessage(getImageValidationMessage(), 'error');
        return false;
      }

      genImgInput.value = normalized;
      regenerateRidForCurrentImage();
      ensureRidExists();
      updateGeneratedUrl({ refreshPreview: true });
      return true;
    }

    async function copyGeneratedUrl() {
      const value = generatedUrlInput.value.trim();
      if (!value) return;

      await copyText(value, copyGeneratedBtn);
    }

    loadBtn.addEventListener('click', loadVisits);

    ridInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        loadVisits();
      }
    });

    generateBtn.addEventListener('click', async () => {
      const isValid = sanitizeImageInput();

      if (!genImgInput.value.trim()) {
        ensureRidExists();
        updateGeneratedUrl();
        await loadVisitsByRid(genRidInput.value);
        return;
      }

      if (isValid && generatedUrlInput.value.trim()) {
        await loadVisitsByRid(genRidInput.value);
      }
    });

    copyGeneratedBtn.addEventListener('click', copyGeneratedUrl);

    genRidInput.addEventListener('input', () => {
      const value = genRidInput.value.toUpperCase().replace(/\s+/g, '');
      genRidInput.value = value;
      ridInput.value = value;
      updateGeneratedUrl();
    });

    genRidInput.addEventListener('blur', () => {
      ensureRidExists();
      updateGeneratedUrl();
    });

    genRidInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        ensureRidExists();
        updateGeneratedUrl();
      }
    });

    genImgInput.addEventListener('input', () => {
      updateGeneratedUrl({ refreshPreview: true });
    });

    genImgInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        sanitizeImageInput();
      }
    });

    genImgInput.addEventListener('blur', sanitizeImageInput);

    genImgInput.addEventListener('paste', () => {
      setTimeout(sanitizeImageInput, 0);
    });

    document.querySelectorAll('th[data-sort]').forEach((th) => {
      th.addEventListener('click', handleSortClick);
    });

    pageSizeSelect.addEventListener('change', () => {
      paginationState.pageSize = pageSizeSelect.value === 'all' ? 'all' : Number(pageSizeSelect.value);
      paginationState.page = 1;

      const activeTab = getActiveTab();
      if (activeTab) {
        activeTab.paginationState = { ...paginationState };
      }

      if (currentVisits.length) {
        renderTable();
      } else {
        updatePaginationUI(0);
      }
    });

    firstPageBtn.addEventListener('click', () => {
      if (paginationState.page > 1) {
        paginationState.page = 1;
        renderTable();
      }
    });

    prevPageBtn.addEventListener('click', () => {
      if (paginationState.page > 1) {
        paginationState.page -= 1;
        renderTable();
      }
    });

    nextPageBtn.addEventListener('click', () => {
      const totalPages = getTotalPages(currentVisits.length);
      if (paginationState.page < totalPages) {
        paginationState.page += 1;
        renderTable();
      }
    });

    lastPageBtn.addEventListener('click', () => {
      const totalPages = getTotalPages(currentVisits.length);
      if (paginationState.page < totalPages) {
        paginationState.page = totalPages;
        renderTable();
      }
    });

    async function bootstrapTabsFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const initialRids = params.getAll('rid').map((rid) => rid.trim().toUpperCase()).filter(Boolean);
      const initialActiveRid = (params.get('active') || '').trim().toUpperCase();

      if (!initialRids.length) {
        updateSortIndicators();
        updateGeneratedUrl();
        renderTabs();
        return;
      }

      for (const rid of initialRids) {
        await loadVisitsByRid(rid);
      }

      const activeFromUrl = initialActiveRid ? getTabByRid(initialActiveRid) : null;
      if (activeFromUrl) {
        activateTab(activeFromUrl.id);
      } else if (tabs.length) {
        activateTab(tabs[0].id);
      }
    }

    bootstrapTabsFromUrl();
  </script>
</body>
</html>
