<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ver visitas</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    input {
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #444;
      background: #1b1b1b;
      color: #fff;
      border-radius: 8px;
      min-width: 280px;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      background: #2d6cdf;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #1f57b8;
    }

    .status {
      margin-bottom: 16px;
      color: #ccc;
    }

    .table-wrapper {
      overflow-x: auto;
      border: 1px solid #333;
      border-radius: 10px;
      background: #181818;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #2b2b2b;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #222;
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td {
      background: #202020;
    }

    .empty {
      padding: 20px;
      color: #bbb;
    }

    .parent-row td {
      background: #191919;
      font-weight: 600;
    }

    .child-row td {
      background: #141414;
      color: #ccc;
      font-size: 13px;
    }

    .child-row td:first-child {
      padding-left: 42px;
    }

    .ip-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-ip-btn {
      width: 24px;
      height: 24px;
      min-width: 24px;
      padding: 0;
      border-radius: 6px;
      border: 1px solid #444;
      background: transparent;
      color: #fff;
      font-size: 14px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .toggle-ip-btn:hover {
      background: #2a2a2a;
    }

    .toggle-ip-btn.hidden {
      visibility: hidden;
    }
  </style>
</head>
<body>
  <h1>Visitas por código</h1>

  <div class="topbar">
    <input id="ridInput" type="text" placeholder="Introduce el rid" />
    <button id="loadBtn">Cargar</button>
  </div>

  <div id="status" class="status">Introduce un rid y pulsa Cargar.</div>

  <div class="table-wrapper">
    <table id="visitsTable" style="display: none;">
      <thead>
        <tr>
          <th>IP</th>
          <th>Fecha</th>
          <th>País</th>
          <th>Región</th>
          <th>Ciudad</th>
          <th>Latitud</th>
          <th>Longitud</th>
          <th>User-Agent</th>
        </tr>
      </thead>
      <tbody id="visitsTbody"></tbody>
    </table>

    <div id="emptyState" class="empty">No hay datos cargados.</div>
  </div>

  <script>
    const ridInput = document.getElementById('ridInput');
    const loadBtn = document.getElementById('loadBtn');
    const statusEl = document.getElementById('status');
    const table = document.getElementById('visitsTable');
    const tbody = document.getElementById('visitsTbody');
    const emptyState = document.getElementById('emptyState');

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function createParentRow(visit, index) {
      const tr = document.createElement('tr');
      tr.className = 'parent-row';

      const hasChildren = Array.isArray(visit.children) && visit.children.length > 0;
      const groupClass = `child-group-${index}`;

      tr.innerHTML = `
        <td>
          <div class="ip-cell">
            <button
              class="toggle-ip-btn ${hasChildren ? '' : 'hidden'}"
              data-group="${groupClass}"
              data-open="false"
              type="button"
            >
              +
            </button>
            <span>${escapeHtml(visit.ip || '')}</span>
          </div>
        </td>
        <td>${escapeHtml(visit.created_at || '')}</td>
        <td>${escapeHtml(visit.country || '')}</td>
        <td>${escapeHtml(visit.region || '')}</td>
        <td>${escapeHtml(visit.city || '')}</td>
        <td>${escapeHtml(visit.latitude || '')}</td>
        <td>${escapeHtml(visit.longitude || '')}</td>
        <td>${escapeHtml(visit.user_agent || '')}</td>
      `;

      return tr;
    }

    function createChildRow(child, index) {
      const tr = document.createElement('tr');
      tr.className = `child-row child-group-${index}`;
      tr.style.display = 'none';

      tr.innerHTML = `
        <td>↳ ${escapeHtml(child.ip || '')}</td>
        <td>${escapeHtml(child.first_seen || child.created_at || '')}</td>
        <td>${escapeHtml(child.country || '')}</td>
        <td>${escapeHtml(child.region || '')}</td>
        <td>${escapeHtml(child.city || '')}</td>
        <td>${escapeHtml(child.latitude || '')}</td>
        <td>${escapeHtml(child.longitude || '')}</td>
        <td>${escapeHtml(child.user_agent || '')}</td>
      `;

      return tr;
    }

    function bindToggleButtons() {
      const buttons = document.querySelectorAll('.toggle-ip-btn:not(.hidden)');

      buttons.forEach((button) => {
        button.addEventListener('click', () => {
          const groupClass = button.dataset.group;
          const isOpen = button.dataset.open === 'true';
          const rows = document.querySelectorAll('.' + groupClass);

          rows.forEach((row) => {
            row.style.display = isOpen ? 'none' : 'table-row';
          });

          button.dataset.open = isOpen ? 'false' : 'true';
          button.textContent = isOpen ? '+' : '−';
        });
      });
    }

    async function loadVisits() {
      const rid = ridInput.value.trim();

      if (!rid) {
        statusEl.textContent = 'Debes introducir un rid.';
        table.style.display = 'none';
        emptyState.style.display = 'block';
        emptyState.textContent = 'No hay datos cargados.';
        return;
      }

      statusEl.textContent = 'Cargando...';
      table.style.display = 'none';
      emptyState.style.display = 'block';
      emptyState.textContent = 'Cargando datos...';
      tbody.innerHTML = '';

      try {
        const response = await fetch('/api/visits?rid=' + encodeURIComponent(rid));
        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || 'Error al cargar visitas');
        }

        const visits = Array.isArray(data.visits) ? data.visits : [];

        if (visits.length === 0) {
          statusEl.textContent = 'No se han encontrado registros para ese rid.';
          table.style.display = 'none';
          emptyState.style.display = 'block';
          emptyState.textContent = 'Sin resultados.';
          return;
        }

        visits.forEach((visit, index) => {
          tbody.appendChild(createParentRow(visit, index));

          if (Array.isArray(visit.children) && visit.children.length > 0) {
            visit.children.forEach((child) => {
              tbody.appendChild(createChildRow(child, index));
            });
          }
        });

        bindToggleButtons();

        statusEl.textContent = `Se han encontrado ${visits.length} IPs agrupadas.`;
        emptyState.style.display = 'none';
        table.style.display = 'table';
      } catch (error) {
        statusEl.textContent = 'Error al cargar los datos.';
        table.style.display = 'none';
        emptyState.style.display = 'block';
        emptyState.textContent = error.message || 'Error inesperado.';
      }
    }

    loadBtn.addEventListener('click', loadVisits);

    ridInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        loadVisits();
      }
    });

    const params = new URLSearchParams(window.location.search);
    const initialRid = params.get('rid');

    if (initialRid) {
      ridInput.value = initialRid;
      loadVisits();
    }
  </script>
</body>
</html>
